services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskls-app
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      # Persists daily submissions JSON database on the host machine
      - ./data:/app/data
    environment:
      - EMPLOYEES=${EMPLOYEES:-Ahmad Fauzi,Budi Santoso,Citra Lestari,Dewi Sartika,Eko Prasetyo}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      - AI_BASE_URL=${AI_BASE_URL:-}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - AI_API_KEY=${AI_API_KEY:-}
      - NODE_ENV=${APP_ENV:-production}
    restart: unless-stopped
